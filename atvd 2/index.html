<!DOCTYPE html>
<html lang="pt-br">
<meta charset="UTF-8">
  <title>ExploreMundo</title>
  <style> 
  
   body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 15px 40px;

  background: linear-gradient(to right, #1e73be, #4aa3ff);
  color: white;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  font-size: 22px;
}

.icone {
  font-size: 22px;
  margin-right: 8px;
}

.destaque {
  color: orange;
  font-weight: bold;
}

/* MENU */
nav a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
  font-weight: 500;
  position: relative;
}

/* linha embaixo (hover e ativo) */
nav a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 2px;
  background: white;
  left: 0;
  bottom: -6px;
  transition: 0.3s;
}

/* hover */
nav a:hover::after {
  width: 100%;
}

/* ativo (Início selecionado) */
nav a.ativo::after {
  width: 100%;
}
/*imagem saiba mais */
.hero {
    height: 400px;
    background-image: url('imagem 1.png'); 
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

/* camada escura para melhorar leitura */
.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 400px;
    background: rgba(0,0,0,0.4);
}

/* conteúdo */
.conteudo {
    position: relative;
    z-index: 1;
}

h1 {
    font-size: 40px;
    margin: 0;
}

p {
    margin: 10px 0;
}

.botao {
    display: inline-block;
    padding: 10px 20px;
    background-color: orange;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
  </style>
  <header class="navbar">
  <div class="logo">
    <span class="icone">📍</span>
    <span class="texto">
      <strong>Explore</strong><span class="destaque">Mundo</span>
    </span>
  </div>

  <nav>
    <a href="#" class="ativo">Início</a>
    <a href="#">Destinos</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </nav>

  
  
  </header>
  <bodY>
 <div class="hero">
    <div class="conteudo">
        <h1>Descubra Lugares Incríveis!</h1>
        <p>Explore os melhores destinos ao redor do mundo.</p>
        <a href="#" class="botao">Saiba Mais</a>
    </div>
</div>
